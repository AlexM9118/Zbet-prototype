name: ZBet scheduled OddsPapi primary refresh

on:
  workflow_dispatch:
  schedule:
    - cron: "10 6 * * 2,4,6" # Tue/Thu/Sat 06:10 UTC

permissions:
  contents: write

concurrency:
  group: zbet-oddspapi-primary-refresh
  cancel-in-progress: false

jobs:
  odds_refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Ensure data folder exists
        run: mkdir -p data

      - name: Run odds-by-tournaments (batched)
        env:
          ODDSPAPI_KEY: ${{ secrets.ODDSPAPI_KEY }}
          BOOKMAKER: "superbet"
          VERBOSITY: "2"
          ODDS_FORMAT: "decimal"
        run: node scripts/oddspapi-fetch-odds-by-tournaments.js

      - name: Build UI data (normalize OddsPapi)
        run: node scripts/build-ui-data-from-oddspapi.js

      - name: Build UI history stats
        run: node scripts/build-ui-history-stats.js

      - name: Build history archive
        run: node scripts/build-history-archive.js

      - name: Build backtest summary
        run: node scripts/build-backtest-summary.mjs

      - name: Verify snapshot freshness
        env:
          MAX_SNAPSHOT_AGE_HOURS: "30"
        run: node scripts/verify-odds-snapshot-freshness.mjs

      - name: Update admin watchdog status
        env:
          REFRESH_SOURCE: "scheduled"
        run: node scripts/write-admin-watchdog-status.mjs

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/oddspapi_odds.json data/oddspapi_odds_index.json || true
          git add data/oddspapi_odds_parts || true
          git add data/ui/admin_watchdog_status.json || true
          git add data/ui || true

          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git commit -m "ZBet scheduled OddsPapi refresh"
          git push
